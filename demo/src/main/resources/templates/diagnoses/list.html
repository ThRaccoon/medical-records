<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Diagnoses</title>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Diagnoses</h2>

<a sec:authorize="hasRole('ADMIN')" href="/diagnoses/new">Add New Diagnosis</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    <tr th:each="diagnosis : ${diagnoses}">
        <td th:text="${diagnosis.id}"></td>
        <td th:text="${diagnosis.name}"></td>
        <td th:text="${diagnosis.description}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/diagnoses/edit/{id}(id=${diagnosis.id})}">Edit</a> |
            <a th:href="@{/diagnoses/delete/{id}(id=${diagnosis.id})}">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
