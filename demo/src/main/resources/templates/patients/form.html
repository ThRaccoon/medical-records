<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Form</title>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Patient Form</h2>

<form th:action="@{/patients/save}" th:object="${patient}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <label>Name</label>
    <input type="text" th:field="*{name}"/>
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span><br/>

    <label>EGN</label>
    <input type="text" th:field="*{egn}"/>
    <span th:if="${#fields.hasErrors('egn')}" th:errors="*{egn}"></span><br/>

    <label>Insured</label>
    <input type="checkbox" th:field="*{insured}"/><br/>

    <label>GP Doctor</label>
    <select th:field="*{gpDoctorId}">
        <option value="">-- Select GP --</option>
        <option th:each="doctor : ${doctors}"
                th:value="${doctor.id}"
                th:text="${doctor.name}">
        </option>
    </select>
    <span th:if="${#fields.hasErrors('gpDoctorId')}" th:errors="*{gpDoctorId}"></span><br/>

    <button type="submit">Save</button>
</form>
</body>
</html>
