<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Patients</title>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Patients</h2>

<a sec:authorize="hasRole('ADMIN')" href="/patients/new">Add New Patient</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>EGN</th>
        <th>Insured</th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    <tr th:each="patient : ${patients}">
        <td th:text="${patient.id}"></td>
        <td th:text="${patient.name}"></td>
        <td th:text="${patient.egn}"></td>
        <td th:text="${patient.insured}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/patients/edit/{id}(id=${patient.id})}">Edit</a> |
            <a th:href="@{/patients/delete/{id}(id=${patient.id})}">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
