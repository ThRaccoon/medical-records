<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Visits by Patient</title>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Visit History by Patient</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Doctor ID</th>
        <th>Diagnosis ID</th>
        <th>Treatment</th>
        <th>Price</th>
        <th>Paid by NZOK</th>
    </tr>
    <tr th:each="visit : ${visits}">
        <td th:text="${visit.id}"></td>
        <td th:text="${visit.date}"></td>
        <td th:text="${visit.doctorId}"></td>
        <td th:text="${visit.diagnosisId}"></td>
        <td th:text="${visit.treatment}"></td>
        <td th:text="${visit.price}"></td>
        <td th:text="${visit.paidByNzok}"></td>
    </tr>
</table>
</body>
</html>
