<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Sick Leaves</title>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Sick Leaves</h2>

<a sec:authorize="hasAnyRole('ADMIN', 'DOCTOR')" href="/sick-leaves/new">Add New Sick Leave</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Start Date</th>
        <th>Number of Days</th>
        <th>Visit ID</th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    <tr th:each="sickLeave : ${sickLeaves}">
        <td th:text="${sickLeave.id}"></td>
        <td th:text="${sickLeave.startDate}"></td>
        <td th:text="${sickLeave.numberOfDays}"></td>
        <td th:text="${sickLeave.visitId}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/sick-leaves/edit/{id}(id=${sickLeave.id})}">Edit</a> |
            <a th:href="@{/sick-leaves/delete/{id}(id=${sickLeave.id})}">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
