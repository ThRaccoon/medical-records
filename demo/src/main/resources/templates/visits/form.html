<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Visit Form</title>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Visit Form</h2>

<form th:action="@{/visits/save}" th:object="${visit}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <label>Date</label>
    <input type="date" th:field="*{date}"/>
    <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span><br/>

    <label>Treatment</label>
    <input type="text" th:field="*{treatment}"/>
    <span th:if="${#fields.hasErrors('treatment')}" th:errors="*{treatment}"></span><br/>

    <label>Price</label>
    <input type="number" step="0.01" th:field="*{price}"/>
    <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span><br/>

    <label>Paid by NZOK</label>
    <input type="checkbox" th:field="*{paidByNzok}"/><br/>

    <label>Doctor</label>
    <select th:field="*{doctorId}">
        <option value="">-- Select Doctor --</option>
        <option th:each="doctor : ${doctors}"
                th:value="${doctor.id}"
                th:text="${doctor.name}">
        </option>
    </select>
    <span th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}"></span><br/>

    <label>Patient</label>
    <select th:field="*{patientId}">
        <option value="">-- Select Patient --</option>
        <option th:each="patient : ${patients}"
                th:value="${patient.id}"
                th:text="${patient.name}">
        </option>
    </select>
    <span th:if="${#fields.hasErrors('patientId')}" th:errors="*{patientId}"></span><br/>

    <label>Diagnosis</label>
    <select th:field="*{diagnosisId}">
        <option value="">-- Select Diagnosis --</option>
        <option th:each="diagnosis : ${diagnoses}"
                th:value="${diagnosis.id}"
                th:text="${diagnosis.name}">
        </option>
    </select>
    <span th:if="${#fields.hasErrors('diagnosisId')}" th:errors="*{diagnosisId}"></span><br/>

    <button type="submit">Save</button>
</form>
</body>
</html>
